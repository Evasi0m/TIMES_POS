// Custom storage adapter — chooses localStorage (remember me) vs sessionStorage (clear on browser close)
// based on the `pos.remember` flag set when the user logs in.
// Default = remember (localStorage). Reads from both stores so existing sessions survive a flag flip.
const REMEMBER_KEY = "pos.remember";
const isRemember = () => localStorage.getItem(REMEMBER_KEY) !== "false";
const authStorage = {
  getItem: (k) => localStorage.getItem(k) ?? sessionStorage.getItem(k),
  setItem: (k, v) => {
    if (isRemember()) { localStorage.setItem(k, v); sessionStorage.removeItem(k); }
    else              { sessionStorage.setItem(k, v); localStorage.removeItem(k); }
  },
  removeItem: (k) => { localStorage.removeItem(k); sessionStorage.removeItem(k); },
};

function applyDiscounts(unitPrice, qty, d1v, d1t, d2v, d2t) {
  let s1 = Number(unitPrice) || 0;
  if (d1t === 'percent') s1 = s1 * (1 - (Number(d1v)||0) / 100);
  else if (d1t === 'baht') s1 = s1 - (Number(d1v)||0);
  let s2 = s1;
  if (d2t === 'percent') s2 = s2 * (1 - (Number(d2v)||0) / 100);
  else if (d2t === 'baht') s2 = s2 - (Number(d2v)||0);
  return Math.max(0, s2) * (Number(qty) || 0);
}
function applyOrderDiscount(subtotal, value, type) {
  if (type === 'percent') return Math.max(0, subtotal * (1 - (Number(value)||0)/100));
  if (type === 'baht') return Math.max(0, subtotal - (Number(value)||0));
  return subtotal;
}

/* =========================================================
   TOAST
========================================================= */
const ToastCtx = React.createContext({ push: ()=>{} });
function ToastProvider({ children }) {
  const [list, setList] = useState([]);
  const push = useCallback((msg, type='info') => {
    const id = Date.now()+Math.random();
    setList(l => [...l, { id, msg, type }]);
    setTimeout(() => setList(l => l.filter(t => t.id !== id)), 3500);
  }, []);
  return (
    <ToastCtx.Provider value={{ push }}>
      {children}
      <div className="fixed bottom-20 lg:bottom-6 right-4 lg:right-6 z-[120] space-y-2 max-w-[calc(100vw-32px)]">
        {list.map(t => (
          <div key={t.id} className={"px-4 py-3 rounded-lg shadow-lg text-sm flex items-center gap-2 " + (t.type==='error'?'bg-error text-white':t.type==='success'?'bg-[#1f3d27] text-white':'bg-surface-dark text-on-dark')}>
            <Icon name={t.type==='error'?'alert':t.type==='success'?'check':'alert'} size={16}/>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => React.useContext(ToastCtx);

function Modal({ open, onClose, title, children, footer, wide }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 modal-overlay z-[100] flex items-end lg:items-center justify-center lg:p-6" onClick={onClose}>
      <div className={"bg-canvas rounded-t-2xl lg:rounded-lg shadow-xl w-full sheet-anim lg:animate-none " + (wide?"lg:max-w-3xl":"lg:max-w-lg") + " max-h-[92vh] flex flex-col"} onClick={e=>e.stopPropagation()}>
        <div className="px-5 py-4 border-b hairline flex items-center justify-between flex-shrink-0">
          <div className="font-display text-xl lg:text-2xl">{title}</div>
          <button className="btn-ghost !p-2" onClick={onClose}><Icon name="x" size={20}/></button>
        </div>
        <div className="p-5 overflow-y-auto flex-1">{children}</div>
        {footer && <div className="px-5 py-4 border-t hairline flex justify-end gap-2 flex-shrink-0 pb-safe">{footer}</div>}

}

/* =========================================================
   LOGIN
========================================================= */
const LAST_EMAIL_KEY = "pos.lastEmail";
function LoginScreen() {
  const [email, setEmail] = useState(() => localStorage.getItem(LAST_EMAIL_KEY) || "");
  const [password, setPassword] = useState("");
  const [remember, setRemember] = useState(() => localStorage.getItem(REMEMBER_KEY) !== "false");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const submit = async (e) => {
    e.preventDefault();
    setErr(""); setBusy(true);
    // Persist remember-me flag BEFORE signing in so authStorage routes tokens correctly
    localStorage.setItem(REMEMBER_KEY, remember ? "true" : "false");
    if (remember) localStorage.setItem(LAST_EMAIL_KEY, email);
    else          localStorage.removeItem(LAST_EMAIL_KEY);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setBusy(false);
    if (error) setErr(error.message || "เข้าสู่ระบบไม่สำเร็จ");
  };
  return (
    <div className="min-h-screen flex items-center justify-center bg-canvas px-5">
      <div className="w-full max-w-md">
        <div className="flex items-center gap-3 mb-8 lg:mb-10 justify-center">
          <span className="spike lg" />
          <div className="font-display text-3xl lg:text-4xl">TIMES</div>
        </div>
        <div className="card-canvas p-6 lg:p-8">
          <div className="text-xs uppercase tracking-[1.5px] text-muted font-medium">POS · ร้านนาฬิกา</div>
          <h1 className="font-display text-4xl lg:text-5xl mt-2 mb-6 text-ink">เข้าสู่ระบบ</h1>
          <form onSubmit={submit} className="space-y-4">
            <div>
              <label className="text-xs uppercase tracking-wider text-muted font-medium">อีเมล</label>
              <input type="email" autoFocus inputMode="email" autoComplete="email" className="input mt-1" value={email} onChange={e=>setEmail(e.target.value)} required />
            </div>
            <div>
              <label className="text-xs uppercase tracking-wider text-muted font-medium">รหัสผ่าน</label>
              <input type="password" autoComplete="current-password" className="input mt-1" value={password} onChange={e=>setPassword(e.target.value)} required />
            </div>

            <label className="flex items-center gap-3 cursor-pointer select-none py-1">
              <span className={"relative flex items-center justify-center w-5 h-5 rounded border transition-colors " + (remember?"bg-primary border-primary":"bg-canvas border-hairline hover:border-muted")}>
                <input type="checkbox" className="sr-only" checked={remember} onChange={e=>setRemember(e.target.checked)} />
                {remember && <Icon name="check" size={14} className="text-white" strokeWidth={2.5}/>}
              </span>
              <span className="text-sm text-ink">จดจำการเข้าสู่ระบบ</span>
              <span className="text-xs text-muted-soft ml-auto">{remember? "ค้างไว้":"ออกเมื่อปิดเบราว์เซอร์"}</span>
            </label>

            {err && <div className="text-sm text-error bg-error/10 px-3 py-2 rounded-md flex items-center gap-2"><Icon name="alert" size={16}/>{err}</div>}
            <button className="btn-primary w-full !py-3" disabled={busy}>
              {busy ? "กำลังเข้าสู่ระบบ..." : "เข้าสู่ระบบ"}
            </button>

        <div className="text-center text-sm text-muted-soft mt-6 font-italic">"ทุกเรือนมีเรื่องราว"</div>

    </div>
  );
}

/* =========================================================
   POS VIEW
========================================================= */
function POSView() {
  const toast = useToast();
  const [search, setSearch] = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [cart, setCart] = useState([]);
  const [channel, setChannel] = useState("store");
  const [payment, setPayment] = useState("cash");
  const [orderDiscount, setOrderDiscount] = useState({ value: 0, type: null });
  const [submitting, setSubmitting] = useState(false);
  const [cartOpen, setCartOpen] = useState(false);
  const [expandedDisc, setExpandedDisc] = useState({});
  const searchRef = useRef(null);

  useEffect(() => {
    if (!search.trim()) { setResults([]); return; }
    let cancelled = false;
    setSearching(true);
    const t = setTimeout(async () => {
      const q = search.trim();
      const { data: barcodeHit } = await sb.from('products').select('*').eq('barcode', q).limit(1);
      let rows = [];
      if (barcodeHit && barcodeHit.length) rows = barcodeHit;
      else {
        const { data, error } = await sb.from('products').select('*').ilike('name', `%${q}%`).limit(20);
        if (!error) rows = data || [];
      }
      if (!cancelled) { setResults(rows); setSearching(false); }
    }, 200);
    return () => { cancelled = true; clearTimeout(t); };
  }, [search]);

  const addToCart = (p) => {
    setCart(c => {
      const i = c.findIndex(x => x.product_id === p.id);
      if (i >= 0) {
        const n = [...c]; n[i] = { ...n[i], quantity: n[i].quantity + 1 }; return n;
      }
      return [...c, {
        product_id: p.id, product_name: p.name, barcode: p.barcode,
        quantity: 1, unit_price: Number(p.retail_price)||0,
        discount1_value: 0, discount1_type: null,
        discount2_value: 0, discount2_type: null,
        current_stock: p.current_stock,
      }];
    });
    setSearch(""); setResults([]); searchRef.current?.focus();
  };
  const updateLine = (idx, patch) => setCart(c => c.map((l,i)=> i===idx?{...l,...patch}:l));
  const removeLine = (idx) => setCart(c => c.filter((_,i)=>i!==idx));
  const lineNet = (l) => applyDiscounts(l.unit_price, l.quantity, l.discount1_value, l.discount1_type, l.discount2_value, l.discount2_type);
  const subtotal = useMemo(()=> cart.reduce((s,l)=> s + lineNet(l), 0), [cart]);
  const grand = useMemo(()=> applyOrderDiscount(subtotal, orderDiscount.value, orderDiscount.type), [subtotal, orderDiscount]);
  const totalQty = useMemo(()=> cart.reduce((s,l)=> s+l.quantity, 0), [cart]);

  const submit = async () => {
    if (!cart.length) { toast.push("ไม่มีสินค้าในตะกร้า", "error"); return; }
    setSubmitting(true);
    try {
      const { data: order, error: e1 } = await sb.from('sale_orders').insert({
        sale_date: new Date().toISOString(), channel, payment_method: payment,
        discount_value: orderDiscount.value || 0, discount_type: orderDiscount.type,
        subtotal, total_after_discount: grand, grand_total: grand,
      }).select().single();
      if (e1) throw e1;
      const items = cart.map(l => ({
        sale_order_id: order.id, product_id: l.product_id, product_name: l.product_name,
        quantity: l.quantity, unit_price: l.unit_price,
        discount1_value: l.discount1_value || 0, discount1_type: l.discount1_type,
        discount2_value: l.discount2_value || 0, discount2_type: l.discount2_type,
      }));
      const { error: e2 } = await sb.from('sale_order_items').insert(items);
      if (e2) throw e2;
      for (const l of cart) {
        if (!l.product_id) continue;
        await sb.rpc('adjust_stock', { p_id: l.product_id, qty_delta: -l.quantity });
      }
      toast.push(`บันทึกบิล #${order.id} · ${fmtTHB(grand)}`, 'success');
      setCart([]); setOrderDiscount({ value: 0, type: null });
      setChannel("store"); setPayment("cash"); setCartOpen(false);
    } catch (err) {
      toast.push("บันทึกไม่สำเร็จ: " + (err.message || err), 'error');
    } finally { setSubmitting(false); }
  };

  const SearchInput = (
    <div className="relative">
      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-muted"><Icon name="search" size={18}/></span>
      <input
        ref={searchRef}
        className="input !pl-10 !py-3 !text-base"
        placeholder="สแกนบาร์โค้ด หรือพิมพ์ชื่อรุ่น"
        value={search}
        onChange={e=>setSearch(e.target.value)}
        autoFocus
      />
      {search && <button className="absolute right-2 top-1/2 -translate-y-1/2 btn-ghost !p-1.5" onClick={()=>{setSearch("");setResults([]);searchRef.current?.focus();}}><Icon name="x" size={16}/></button>}
    </div>
  );

  const ResultsList = (
    <div className="card-canvas overflow-hidden">
      {!search && (
        <div className="p-8 lg:p-12 text-center">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-full bg-surface-card text-muted mb-4">
            <Icon name="barcode" size={28}/>
          </div>
          <div className="font-display text-2xl lg:text-3xl text-ink mb-1">เริ่มสแกนสินค้า</div>
          <p className="text-muted text-sm">พิมพ์ชื่อรุ่นหรือยิงบาร์โค้ดในช่องด้านบน</p>
        </div>
      )}
      {search && searching && <div className="p-6 text-muted text-sm">กำลังค้นหา...</div>}
      {search && !searching && results.length===0 && <div className="p-6 text-muted text-sm">ไม่พบสินค้า "{search}"</div>}
      {results.map(p => (
        <div key={p.id} className="px-4 lg:px-5 py-3 border-b hairline-soft last:border-0 hover:bg-surface-card cursor-pointer flex items-center gap-3" onClick={()=>addToCart(p)}>
          <div className="flex-1 min-w-0">
            <div className="font-medium text-ink truncate text-sm lg:text-base">{p.name}</div>
            <div className="text-xs text-muted mt-0.5 font-mono truncate">{p.barcode || '— ไม่มีบาร์โค้ด —'}</div>
          </div>
          <div className="text-right flex-shrink-0">
            <div className="font-display text-lg lg:text-xl text-ink leading-tight">{fmtTHB(p.retail_price)}</div>
            <div className="mt-1">
              <span className={"badge-pill " + (p.current_stock<=0?'!bg-error/10 !text-error':p.current_stock<5?'!bg-warning/15 !text-[#8a6500]':'')}>
                คงเหลือ {p.current_stock}
              </span>
            </div>
          </div>
          <button className="btn-primary !py-2 !px-3 flex-shrink-0" aria-label="เพิ่ม"><Icon name="plus" size={16}/></button>
        </div>
      ))}
    </div>
  );

  const CartContent = (close) => (
    <>
      <div className="flex-1 overflow-y-auto p-3">
        {!cart.length && (
          <div className="p-8 text-center">
            <div className="inline-flex w-12 h-12 items-center justify-center rounded-full bg-surface-card text-muted mb-3"><Icon name="cart" size={24}/></div>
            <div className="text-muted text-sm">ยังไม่มีสินค้า</div>
          </div>
        )}
        {cart.map((l, idx) => {
          const expanded = expandedDisc[idx];
          return (
            <div key={idx} className="bg-canvas rounded-md p-3 mb-2 border hairline">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1 min-w-0">
                  <div className="font-medium text-sm truncate">{l.product_name}</div>
                  <div className="text-xs text-muted font-mono truncate">{l.barcode||''}</div>
                </div>
                <button className="text-muted-soft hover:text-error p-1" onClick={()=>removeLine(idx)} aria-label="ลบ"><Icon name="trash" size={16}/></button>
              </div>
              <div className="flex items-center gap-2 mt-2">
                <div className="flex items-center bg-surface-card rounded-md">
                  <button className="px-2 py-1.5 text-ink hover:bg-surface-cream-strong rounded-l-md" onClick={()=>updateLine(idx,{quantity:Math.max(1,l.quantity-1)})}><Icon name="minus" size={14}/></button>
                  <input type="number" min="1" inputMode="numeric" className="w-10 text-center bg-transparent text-sm font-medium border-0 focus:!outline-none" value={l.quantity} onChange={e=>updateLine(idx,{quantity:Math.max(1,Number(e.target.value)||1)})}/>
                  <button className="px-2 py-1.5 text-ink hover:bg-surface-cream-strong rounded-r-md" onClick={()=>updateLine(idx,{quantity:l.quantity+1})}><Icon name="plus" size={14}/></button>
                </div>
                <div className="text-xs text-muted flex-1">@ {fmtTHB(l.unit_price)}</div>
                <div className="text-right font-medium text-sm">{fmtTHB(lineNet(l))}</div>
              </div>
              <button className="mt-2 text-xs text-muted hover:text-primary inline-flex items-center gap-1" onClick={()=>setExpandedDisc(s=>({...s,[idx]:!expanded}))}>
                <Icon name="tag" size={12}/> ส่วนลดต่อชิ้น <Icon name={expanded?"chevron-d":"chevron-r"} size={12}/>
              </button>
              {expanded && (
                <div className="grid grid-cols-12 gap-1 mt-2">
                  <input type="number" inputMode="numeric" className="input !py-1 !text-xs col-span-4" placeholder="ลด 1" value={l.discount1_value||""} onChange={e=>updateLine(idx,{discount1_value:Number(e.target.value)||0, discount1_type: l.discount1_type||'baht'})}/>
                  <select className="input !py-1 !text-xs col-span-2" value={l.discount1_type||""} onChange={e=>updateLine(idx,{discount1_type:e.target.value||null})}>
                    <option value="">—</option><option value="baht">฿</option><option value="percent">%</option>
                  </select>
                  <input type="number" inputMode="numeric" className="input !py-1 !text-xs col-span-4" placeholder="ลด 2" value={l.discount2_value||""} onChange={e=>updateLine(idx,{discount2_value:Number(e.target.value)||0, discount2_type: l.discount2_type||'baht'})}/>
                  <select className="input !py-1 !text-xs col-span-2" value={l.discount2_type||""} onChange={e=>updateLine(idx,{discount2_type:e.target.value||null})}>
                    <option value="">—</option><option value="baht">฿</option><option value="percent">%</option>
                  </select>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="p-4 lg:p-5 border-t hairline bg-surface-cream-strong flex-shrink-0">
        <div className="grid grid-cols-2 gap-2 mb-3">
          <div>
            <label className="text-[10px] uppercase tracking-wider text-muted">ช่องทาง</label>
            <select className="input mt-1 !py-2 !text-sm" value={channel} onChange={e=>setChannel(e.target.value)}>
              {CHANNELS.map(c=> <option key={c.v} value={c.v}>{c.label}</option>)}
            </select>
          </div>
          <div>
            <label className="text-[10px] uppercase tracking-wider text-muted">ชำระโดย</label>
            <select className="input mt-1 !py-2 !text-sm" value={payment} onChange={e=>setPayment(e.target.value)}>
              {PAYMENTS.map(p=> <option key={p.v} value={p.v}>{p.label}</option>)}
            </select>
          </div>
        </div>

        <div className="grid grid-cols-12 gap-2 mb-3 items-end">
          <div className="col-span-7">
            <label className="text-[10px] uppercase tracking-wider text-muted">ส่วนลดท้ายบิล</label>
            <input type="number" inputMode="numeric" className="input mt-1 !py-2 !text-sm" placeholder="0" value={orderDiscount.value||""} onChange={e=>setOrderDiscount(d=>({...d, value: Number(e.target.value)||0, type: d.type||'baht'}))}/>
          </div>
          <div className="col-span-5">
            <select className="input !py-2 !text-sm" value={orderDiscount.type||""} onChange={e=>setOrderDiscount(d=>({...d, type:e.target.value||null}))}>
              <option value="">— ไม่ลด —</option>
              <option value="baht">บาท</option>
              <option value="percent">เปอร์เซ็นต์</option>
            </select>
          </div>
        </div>

        <div className="flex justify-between text-sm text-muted mb-1"><span>รวมก่อนลด</span><span>{fmtTHB(subtotal)}</span></div>
        <div className="flex justify-between font-display text-3xl mb-3"><span>รวม</span><span>{fmtTHB(grand)}</span></div>

        <button className="btn-primary w-full !py-3 !text-base" disabled={submitting||!cart.length} onClick={submit}>
          {submitting? 'กำลังบันทึก...' : `ชำระเงิน ${fmtTHB(grand)}`}
        </button>
      </div>
    </>
  );

  return (
    <>
      {/* DESKTOP LAYOUT */}
      <div className="hidden lg:grid grid-cols-12 gap-6 px-10 py-8 h-[calc(100vh-180px)]">
        <div className="col-span-7 flex flex-col">
          <div className="card-canvas p-3 mb-4">{SearchInput}</div>
          <div className="flex-1 overflow-y-auto">{ResultsList}</div>
        </div>
        <div className="col-span-5 flex flex-col">
          <div className="card-cream flex flex-col flex-1 overflow-hidden">
            <div className="p-5 border-b hairline flex items-center justify-between flex-shrink-0">
              <div>
                <div className="font-display text-2xl">ตะกร้า</div>
                <div className="text-xs text-muted mt-0.5">{cart.length} รายการ · {totalQty} ชิ้น</div>
              </div>
              {cart.length>0 && <button className="btn-ghost !text-xs text-muted hover:text-error" onClick={()=>setCart([])}>ล้างตะกร้า</button>}
            </div>
            {CartContent()}
          </div>
        </div>
      </div>

      {/* MOBILE LAYOUT */}
      <div className="lg:hidden px-4 py-4 pb-24">
        <div className="mb-3">{SearchInput}</div>
        {ResultsList}
      </div>

      {/* MOBILE FLOATING CART BUTTON */}
      {cart.length>0 && !cartOpen && (
        <button className="lg:hidden fixed bottom-20 left-4 right-4 z-30 bg-primary text-on-primary rounded-lg shadow-xl px-5 py-3 flex items-center justify-between" onClick={()=>setCartOpen(true)}>
          <div className="flex items-center gap-3">
            <div className="relative">
              <Icon name="cart" size={22}/>
              <span className="absolute -top-2 -right-2 bg-canvas text-ink text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">{totalQty}</span>
            </div>
            <span className="font-medium text-sm">ดูตะกร้า</span>
          </div>
          <span className="font-display text-xl">{fmtTHB(grand)}</span>
        </button>
      )}

      {/* MOBILE CART SHEET */}
      {cartOpen && (
        <div className="lg:hidden fixed inset-0 modal-overlay z-[100] flex items-end" onClick={()=>setCartOpen(false)}>
          <div className="w-full max-h-[92vh] rounded-t-2xl flex flex-col sheet-anim card-cream" onClick={e=>e.stopPropagation()}>
            <div className="px-5 py-4 border-b hairline flex items-center justify-between flex-shrink-0">
              <div>
                <div className="font-display text-2xl">ตะกร้า</div>
                <div className="text-xs text-muted mt-0.5">{cart.length} รายการ · {totalQty} ชิ้น</div>
              </div>
              <button className="btn-ghost !p-2" onClick={()=>setCartOpen(false)}><Icon name="x" size={20}/></button>
            </div>
            {CartContent(true)}
          </div>
        </div>
      )}
    </>
  );
}

/* =========================================================
   PRODUCTS VIEW
========================================================= */
function ProductsView() {
  const toast = useToast();
  const [q, setQ] = useState("");
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    let query;
    if (q.trim()) {
      const term = q.trim();
      query = sb.from('products').select('*').or(`name.ilike.%${term}%,barcode.eq.${term}`).limit(100);
    } else {
      query = sb.from('products').select('*').order('updated_at', { ascending: false }).limit(100);
    }
    const { data, error } = await query;
    if (error) toast.push("โหลดสินค้าไม่ได้", "error");
    setRows(data || []);
    setLoading(false);
  }, [q]);

  useEffect(()=>{ const t = setTimeout(load, 200); return ()=>clearTimeout(t); }, [load]);

  const save = async (p) => {
    try {
      if (p.id) {
        const { error } = await sb.from('products').update({
          name: p.name, barcode: p.barcode||null,
          cost_price: p.cost_price||0, retail_price: p.retail_price||0,
          current_stock: p.current_stock||0,
          updated_at: new Date().toISOString(),
        }).eq('id', p.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('products').insert({
          name: p.name, barcode: p.barcode||null,
          cost_price: p.cost_price||0, retail_price: p.retail_price||0,
          current_stock: p.current_stock||0,
        });
        if (error) throw error;
      }
      toast.push("บันทึกสินค้าสำเร็จ", "success");
      setEditing(null);
      load();
    } catch (e) {
      toast.push("บันทึกไม่ได้: " + e.message, "error");
    }
  };

  return (
    <div className="px-4 py-4 lg:px-10 lg:py-8">
      <div className="flex flex-col sm:flex-row gap-2 sm:gap-3 mb-5">
        <div className="relative flex-1">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-muted"><Icon name="search" size={18}/></span>
          <input className="input !pl-10" placeholder="ชื่อรุ่น หรือ บาร์โค้ด" value={q} onChange={e=>setQ(e.target.value)} />
        </div>

        {!loading && rows.length===0 && <div className="p-4 text-muted text-sm">ไม่พบสินค้า</div>}
        {rows.map(p => (
          <div key={p.id} className="card-canvas p-3 flex items-center gap-3 cursor-pointer active:bg-surface-soft" onClick={()=>setEditing(p)}>
            <div className="flex-1 min-w-0">
              <div className="font-medium truncate">{p.name}</div>
              <div className="font-mono text-xs text-muted truncate mt-0.5">{p.barcode||'—'}</div>
              <div className="flex items-center gap-2 mt-1.5">
                <span className="font-display text-lg leading-none">{fmtTHB(p.retail_price)}</span>
                <span className={"badge-pill " + (p.current_stock<=0?'!bg-error/10 !text-error':p.current_stock<5?'!bg-warning/15 !text-[#8a6500]':'')}>คงเหลือ {p.current_stock}</span>
              </div>
            </div>
            <Icon name="chevron-r" size={18} className="text-muted-soft flex-shrink-0"/>
          </div>
        ))}
      </div>

      <ProductEditor editing={editing} onClose={()=>setEditing(null)} onSave={save} />
    </div>
  );
}

function ProductEditor({ editing, onClose, onSave }) {
  const [draft, setDraft] = useState(null);
  useEffect(()=>{ setDraft(editing? {...editing} : null); }, [editing]);
  if (!draft) return null;
  const set = (k,v)=> setDraft(d=>({...d,[k]:v}));
  return (
    <Modal open={!!draft} onClose={onClose} title={draft.id?"แก้ไขสินค้า":"เพิ่มสินค้าใหม่"}
      footer={<>
        <button className="btn-secondary" onClick={onClose}>ยกเลิก</button>
        <button className="btn-primary" onClick={()=>onSave(draft)}><Icon name="check" size={16}/>บันทึก</button>
      </>}>
      <div className="space-y-4">
        <div>
          <label className="text-xs uppercase tracking-wider text-muted">ชื่อรุ่น</label>
          <input className="input mt-1" value={draft.name||""} onChange={e=>set('name', e.target.value)} />
        </div>
        <div>
          <label className="text-xs uppercase tracking-wider text-muted">บาร์โค้ด</label>
          <input className="input mt-1 font-mono" value={draft.barcode||""} onChange={e=>set('barcode', e.target.value)} />
        </div>
        <div className="grid grid-cols-3 gap-3">
          <div>
            <label className="text-xs uppercase tracking-wider text-muted">ราคาทุน</label>
            <input type="number" inputMode="decimal" className="input mt-1" value={draft.cost_price||0} onChange={e=>set('cost_price', Number(e.target.value))} />
          </div>
          <div>
            <label className="text-xs uppercase tracking-wider text-muted">ราคาขาย</label>
            <input type="number" inputMode="decimal" className="input mt-1" value={draft.retail_price||0} onChange={e=>set('retail_price', Number(e.target.value))} />
          </div>
          <div>
            <label className="text-xs uppercase tracking-wider text-muted">คงเหลือ</label>
            <input type="number" inputMode="numeric" className="input mt-1" value={draft.current_stock||0} onChange={e=>set('current_stock', Number(e.target.value))} />
          </div>
        </div>
      </div>
    </Modal>
  );
}

function StockMovementForm({ kind }) {
  const toast = useToast();
  const [date, setDate] = useState(todayISO());
  const [channel, setChannel] = useState("store");
  const [items, setItems] = useState([]);
  const [search, setSearch] = useState("");
  const [results, setResults] = useState([]);
  const [submitting, setSubmitting] = useState(false);

  useEffect(()=>{
    if (!search.trim()) { setResults([]); return; }
    let cancel=false;
    const t = setTimeout(async ()=>{
      const q = search.trim();
      const { data: barcodeHit } = await sb.from('products').select('*').eq('barcode', q).limit(1);
      let rows = barcodeHit?.length ? barcodeHit : [];
      if (!rows.length) {
        const { data } = await sb.from('products').select('*').ilike('name', `%${q}%`).limit(15);
        rows = data || [];
      }
      if (!cancel) setResults(rows);
    }, 200);
    return ()=>{ cancel=true; clearTimeout(t); };
  }, [search]);

  const addItem = (p) => {
    setItems(it => [...it, {
      product_id: p.id, product_name: p.name,
      quantity: 1, unit: 'เรือน',
      unit_price: kind==='receive' ? Number(p.cost_price)||0 : Number(p.retail_price)||0,
      discount1_value: 0, discount1_type: null,
      discount2_value: 0, discount2_type: null,
    }]);
    setSearch(""); setResults([]);
  };
  const upd = (i, patch) => setItems(it => it.map((x,j)=>j===i?{...x,...patch}:x));
  const rm = (i) => setItems(it => it.filter((_,j)=>j!==i));

  const total = useMemo(()=> items.reduce((s,l)=> s + applyDiscounts(l.unit_price, l.quantity, l.discount1_value, l.discount1_type, l.discount2_value, l.discount2_type), 0), [items]);

  const submit = async () => {
    if (!items.length) { toast.push("ไม่มีรายการ", 'error'); return; }
    setSubmitting(true);
    try {
      const headerTable = kind==='receive' ? 'receive_orders' : 'return_orders';
      const itemTable   = kind==='receive' ? 'receive_order_items' : 'return_order_items';
      const dateField   = kind==='receive' ? 'receive_date' : 'return_date';
      const headerPayload = { [dateField]: new Date(date+'T00:00:00').toISOString(), total_value: total };
      if (kind==='return') headerPayload.channel = channel;
      const { data: head, error: e1 } = await sb.from(headerTable).insert(headerPayload).select().single();
      if (e1) throw e1;
      const fk = kind==='receive' ? 'receive_order_id' : 'return_order_id';
      const payload = items.map(l => ({
        [fk]: head.id, product_id: l.product_id, product_name: l.product_name,
        quantity: l.quantity, unit: l.unit, unit_price: l.unit_price,
        discount1_value: l.discount1_value||0, discount1_type: l.discount1_type,
        discount2_value: l.discount2_value||0, discount2_type: l.discount2_type,
      }));
      const { error: e2 } = await sb.from(itemTable).insert(payload);
      if (e2) throw e2;
      for (const l of items) {
        if (!l.product_id) continue;
        await sb.rpc('adjust_stock', { p_id: l.product_id, qty_delta: l.quantity });
      }
      toast.push(`บันทึก${kind==='receive'?'การรับ':'การคืน'} #${head.id} สำเร็จ`, 'success');
      setItems([]);
    } catch (e) {
      toast.push("บันทึกไม่ได้: " + e.message, 'error');
    } finally { setSubmitting(false); }
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-6">
      {/* LEFT: Header + Search */}
      <div className="lg:col-span-7 space-y-4">
        <div className="card-canvas p-4 lg:p-5">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label className="text-xs uppercase tracking-wider text-muted">วันที่</label>
              <input type="date" className="input mt-1" value={date} onChange={e=>setDate(e.target.value)} />
            </div>
            {kind==='return' && (
              <div>
                <label className="text-xs uppercase tracking-wider text-muted">ช่องทางที่คืน</label>
                <select className="input mt-1" value={channel} onChange={e=>setChannel(e.target.value)}>
                  {CHANNELS.map(c=><option key={c.v} value={c.v}>{c.label}</option>)}
                </select>
              </div>
            )}
          </div>
        </div>

        <div className="card-canvas overflow-hidden">
          <div className="p-3 lg:p-4 border-b hairline">
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-muted"><Icon name="search" size={18}/></span>
              <input className="input !pl-10" placeholder="ค้นหาสินค้าเพื่อเพิ่ม" value={search} onChange={e=>setSearch(e.target.value)} />
            </div>
          </div>
          <div className="max-h-72 overflow-y-auto">
            {results.map(p => (
              <div key={p.id} className="px-4 py-3 border-b hairline-soft last:border-0 hover:bg-surface-card cursor-pointer flex items-center gap-3" onClick={()=>addItem(p)}>
                <div className="min-w-0 flex-1">
                  <div className="font-medium truncate text-sm">{p.name}</div>
                  <div className="text-xs text-muted font-mono truncate">{p.barcode||'—'}</div>
                </div>
                <div className="text-right text-xs flex-shrink-0">
                  <div className="text-muted">ทุน {fmtTHB(p.cost_price)}</div>
                  <div>ขาย {fmtTHB(p.retail_price)}</div>
                </div>
                <button className="btn-primary !py-1.5 !px-2.5 flex-shrink-0"><Icon name="plus" size={14}/></button>
              </div>
            ))}
            {!search && <div className="p-6 text-muted text-sm">พิมพ์เพื่อค้นหาแล้วแตะเพื่อเพิ่มในรายการ</div>}
            {search && !results.length && <div className="p-6 text-muted text-sm">ไม่พบสินค้า</div>}
          </div>
        </div>
      </div>

      {/* RIGHT: List + total */}
      <div className="lg:col-span-5">
        <div className="card-cream overflow-hidden">
          <div className="p-4 lg:p-5 border-b hairline">
            <div className="font-display text-2xl">{kind==='receive'?'รายการรับเข้า':'รายการคืน'}</div>
            <div className="text-xs text-muted mt-0.5">{items.length} รายการ</div>
          </div>
          <div className="max-h-[50vh] lg:max-h-[55vh] overflow-y-auto p-3">
            {!items.length && <div className="p-6 text-center text-muted text-sm">ยังไม่มีรายการ</div>}
            {items.map((l, i) => (
              <div key={i} className="bg-canvas rounded-md p-3 mb-2 border hairline">
                <div className="flex items-start justify-between gap-2">
                  <div className="font-medium text-sm flex-1 truncate">{l.product_name}</div>
                  <button className="text-muted-soft hover:text-error p-1" onClick={()=>rm(i)}><Icon name="trash" size={14}/></button>
                </div>
                <div className="grid grid-cols-12 gap-2 mt-2">
                  <input type="number" inputMode="numeric" min="1" className="input !py-1.5 !text-xs col-span-3" value={l.quantity} onChange={e=>upd(i,{quantity:Math.max(1,Number(e.target.value)||1)})}/>
                  <select className="input !py-1.5 !text-xs col-span-3" value={l.unit} onChange={e=>upd(i,{unit:e.target.value})}>
                    {UNITS.map(u=><option key={u} value={u}>{u}</option>)}
                  </select>
                  <input type="number" inputMode="decimal" className="input !py-1.5 !text-xs col-span-6 text-right" value={l.unit_price} onChange={e=>upd(i,{unit_price:Number(e.target.value)||0})}/>
                </div>
                <div className="text-right text-sm font-medium mt-2">{fmtTHB(applyDiscounts(l.unit_price,l.quantity,l.discount1_value,l.discount1_type,l.discount2_value,l.discount2_type))}</div>
              </div>
            ))}
          </div>
          <div className="p-4 lg:p-5 border-t hairline bg-surface-cream-strong">
            <div className="flex justify-between font-display text-2xl mb-3"><span>รวม</span><span>{fmtTHB(total)}</span></div>
            <button className="btn-primary w-full !py-3" disabled={submitting||!items.length} onClick={submit}>
              {submitting?'กำลังบันทึก...':<><Icon name="check" size={16}/>บันทึก{kind==='receive'?'การรับ':'การคืน'}</>}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   DASHBOARD VIEW
========================================================= */
function DashboardView() {
  const [stats, setStats] = useState(null);
  const [topProducts, setTopProducts] = useState([]);
  const [lowStock, setLowStock] = useState([]);
  const [byChannel, setByChannel] = useState([]);

  useEffect(()=>{ (async ()=>{
    const today = todayISO();
    const startMonth = today.slice(0,7) + '-01';

    const [todayQ, monthQ, lowQ] = await Promise.all([
      sb.from('sale_orders').select('grand_total, channel').gte('sale_date', today + 'T00:00:00').lte('sale_date', today + 'T23:59:59'),
      sb.from('sale_orders').select('grand_total').gte('sale_date', startMonth + 'T00:00:00'),
      sb.from('products').select('id,name,current_stock').lt('current_stock', 5).gt('current_stock', -1).order('current_stock', { ascending: true }).limit(8),
    ]);

    const todayRows = todayQ.data || [];
    const monthRows = monthQ.data || [];
    const todayTotal = todayRows.reduce((s,r)=>s+Number(r.grand_total||0),0);
    const monthTotal = monthRows.reduce((s,r)=>s+Number(r.grand_total||0),0);

    const chMap = {};
    todayRows.forEach(r=>{ const k = r.channel||'store'; chMap[k]=(chMap[k]||0)+Number(r.grand_total||0); });
    setByChannel(Object.entries(chMap).map(([k,v])=>({ channel:k, total:v })));

    setStats({ todayCount: todayRows.length, todayTotal, monthCount: monthRows.length, monthTotal });
    setLowStock(lowQ.data || []);

    const { data: monthIds } = await sb.from('sale_orders').select('id').gte('sale_date', startMonth + 'T00:00:00');
    const ids = (monthIds||[]).map(x=>x.id);
    if (ids.length) {
      const { data: items } = await sb.from('sale_order_items').select('product_name,quantity').in('sale_order_id', ids);
      const map = {};
      (items||[]).forEach(it => { map[it.product_name] = (map[it.product_name]||0) + (Number(it.quantity)||0); });
      const top = Object.entries(map).map(([name,q])=>({name,q})).sort((a,b)=>b.q-a.q).slice(0,8);
      setTopProducts(top);
    } else setTopProducts([]);
  })(); }, []);

  if (!stats) return <div className="px-4 lg:px-10 py-8 text-muted text-sm">กำลังโหลดข้อมูล...</div>;

  const StatCard = ({ tone, label, value, sub, icon }) => (
    <div className={
      "rounded-lg p-4 lg:p-6 " +
      (tone==='canvas' ? "card-canvas" :
       tone==='cream'  ? "card-cream"  :
       tone==='dark'   ? "card-dark"   :
       "bg-primary text-on-primary")
    }>
      <div className="flex items-center justify-between">
        <div className={"text-[10px] lg:text-xs uppercase tracking-[1.5px] " + (tone==='dark'?'text-on-dark-soft':tone==='coral'?'opacity-90':'text-muted')}>{label}</div>
        <span className={tone==='dark'?'text-on-dark-soft':tone==='coral'?'opacity-80':'text-muted-soft'}><Icon name={icon} size={18}/></span>
      </div>
      <div className="font-display text-2xl lg:text-4xl mt-2">{value}</div>
      {sub && <div className={"text-xs mt-1 " + (tone==='dark'?'text-on-dark-soft':tone==='coral'?'opacity-90':'text-muted')}>{sub}</div>}
    </div>
  );

  return (
    <div className="px-4 py-4 lg:px-10 lg:py-8 space-y-4 lg:space-y-8">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
        <StatCard tone="canvas" label="ยอดขายวันนี้" value={fmtTHB(stats.todayTotal)} sub={`${stats.todayCount} บิล`} icon="trend-up"/>
        <StatCard tone="cream"  label="ยอดขายเดือนนี้" value={fmtTHB(stats.monthTotal)} sub={`${stats.monthCount} บิล`} icon="receipt"/>
        <StatCard tone="dark"   label="เฉลี่ยต่อบิล" value={stats.monthCount? fmtTHB(stats.monthTotal/stats.monthCount):'—'} sub={`เดือน ${todayISO().slice(0,7)}`} icon="credit-card"/>
        <StatCard tone="coral"  label="สต็อกใกล้หมด" value={lowStock.length} sub="รายการ (น้อยกว่า 5)" icon="alert"/>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-6">
        <div className="lg:col-span-7 card-canvas p-4 lg:p-6">
          <div className="font-display text-xl lg:text-2xl mb-3 lg:mb-4 flex items-center gap-2"><Icon name="trend-up" size={20}/> สินค้าขายดีเดือนนี้</div>
          {!topProducts.length && <div className="text-muted text-sm">ยังไม่มียอดขายในเดือนนี้</div>}
          {topProducts.map((p,i)=>(
            <div key={p.name} className="flex items-center gap-3 py-2 border-b hairline-soft last:border-0">
              <div className="font-display text-xl lg:text-2xl w-7 text-muted-soft">{i+1}</div>
              <div className="flex-1 truncate text-sm">{p.name}</div>
              <div className="badge-pill">{p.q} ชิ้น</div>
            </div>
          ))}
        </div>
        <div className="lg:col-span-5 card-canvas p-4 lg:p-6">
          <div className="font-display text-xl lg:text-2xl mb-3 lg:mb-4 flex items-center gap-2"><Icon name="alert" size={20}/> สต็อกใกล้หมด</div>
          {!lowStock.length && <div className="text-muted text-sm">สต็อกปลอดภัย</div>}
          {lowStock.map(p => (
            <div key={p.id} className="flex items-center gap-3 py-2 border-b hairline-soft last:border-0">
              <div className="flex-1 truncate text-sm">{p.name}</div>
              <span className={"badge-pill " + (p.current_stock<=0?'!bg-error/10 !text-error':'!bg-warning/15 !text-[#8a6500]')}>{p.current_stock}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="card-dark p-4 lg:p-6">
        <div className="font-display text-xl lg:text-2xl mb-3 lg:mb-4 flex items-center gap-2"><Icon name="store" size={20}/> ยอดขายวันนี้แยกช่องทาง</div>
        {!byChannel.length && <div className="text-on-dark-soft text-sm">ยังไม่มียอดขายวันนี้</div>}
        {byChannel.length>0 && (
          <div className="grid grid-cols-2 lg:grid-cols-5 gap-2 lg:gap-3">
            {CHANNELS.map(c => {
              const v = byChannel.find(x=>x.channel===c.v)?.total || 0;
              return (
                <div key={c.v} className="bg-surface-dark-elevated rounded-md p-3 lg:p-4">
                  <div className="text-[10px] uppercase tracking-wider text-on-dark-soft">{c.label}</div>
                  <div className="font-display text-lg lg:text-2xl mt-1">{fmtTHB(v)}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* =========================================================
   APP SHELL
========================================================= */
function App() {
  const [session, setSession] = useState(undefined);
  const [view, setView] = useState("pos");

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  if (session === undefined) return <div className="min-h-screen flex items-center justify-center bg-canvas text-muted">กำลังโหลด...</div>;
  if (!session) return <ToastProvider><LoginScreen /></ToastProvider>;

  const titles = {
    pos:       { t: "ขายสินค้า",       s: "POS" },
    products:  { t: "สินค้า",           s: "Inventory" },
    sales:     { t: "ประวัติการขาย",     s: "Sales History" },
    stock:     { t: "รับ/คืนสินค้า",     s: "Stock" },
    dashboard: { t: "แดชบอร์ด",         s: "Dashboard" },
  };

  return (
    <ToastProvider>
      <div className="lg:flex">
        <Sidebar view={view} setView={setView} userEmail={session.user?.email} />
        <main className="flex-1 min-h-screen pb-16 lg:pb-0">
          <MobileTopBar title={titles[view].t} userEmail={session.user?.email} onLogout={()=>sb.auth.signOut()}/>
          <PageHeader title={titles[view].t} subtitle={titles[view].s} />
          {view==='pos' && <POSView />}
          {view==='products' && <ProductsView />}
          {view==='sales' && <SalesView />}
          {view==='stock' && <StockView />}
          {view==='dashboard' && <DashboardView />}
        </main>
      </div>
      <MobileTabBar view={view} setView={setView} />
    </ToastProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
