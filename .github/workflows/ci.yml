# CI for TIMES_POS — runs on every push + PR.
#
# Steps:
#   1. install (with npm cache)
#   2. lint  — eslint, fails on errors only (not warnings)
#   3. test  — vitest unit tests
#   4. build — verify dist/index.html bundles without error
#
# We DON'T run format:check here yet — codebase is being migrated, format
# enforcement comes after Phase 5 polish.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify single-file bundle
        run: |
          test -f dist/index.html || (echo "::error::dist/index.html missing" && exit 1)
          test -f dist/sw.js || (echo "::error::dist/sw.js missing" && exit 1)
          echo "Bundle size: $(du -h dist/index.html | cut -f1)"
